<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ADB Wireless Pair</title>
  <style>
    :root {
      --bg-color: #121214;
      --card-bg: #1e1e24;
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --text-main: #f3f4f6;
      --text-sub: #9ca3af;
      --border: #2e2e38;
      --success: #10b981;
      --danger: #ef4444;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 1rem;
    }

    .card {
      background-color: var(--card-bg);
      border-radius: 1rem;
      padding: 2rem 1.5rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border);
    }

    h1 {
      font-size: 1.4rem;
      margin-bottom: 0.5rem;
      text-align: center;
      background: linear-gradient(135deg, #a78bfa, var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .desc {
      font-size: 0.85rem;
      color: var(--text-sub);
      text-align: center;
      margin-bottom: 1.5rem;
      line-height: 1.4;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-sub);
      margin-bottom: 0.375rem;
    }

    .form-control {
      width: 100%;
      padding: 0.75rem;
      border-radius: 0.5rem;
      background-color: rgba(0,0,0,0.2);
      border: 1px solid var(--border);
      color: var(--text-main);
      font-size: 1rem;
      outline: none;
    }

    .form-control:focus {
      border-color: var(--primary);
    }

    .btn {
      width: 100%;
      padding: 0.75rem;
      background-color: var(--primary);
      color: white;
      border: none;
      border-radius: 0.5rem;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 1rem;
      transition: all 0.2s;
    }

    .btn:hover {
      background-color: var(--primary-hover);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .status-msg {
      padding: 0.75rem;
      border-radius: 0.5rem;
      margin-top: 1rem;
      font-size: 0.85rem;
      text-align: center;
      display: none;
      word-break: break-all;
    }

    .status-success {
      background-color: rgba(16, 185, 129, 0.1);
      border: 1px solid var(--success);
      color: var(--success);
      display: block;
    }

    .status-error {
      background-color: rgba(239, 68, 68, 0.1);
      border: 1px solid var(--danger);
      color: var(--danger);
      display: block;
    }

    .info-badge {
      display: inline-block;
      padding: 0.25rem 0.5rem;
      background-color: rgba(99, 102, 241, 0.1);
      border: 1px solid rgba(99, 102, 241, 0.2);
      border-radius: 0.25rem;
      font-size: 0.8rem;
      color: var(--primary);
      font-family: monospace;
      margin-bottom: 1rem;
    }

    .center {
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>ADB Wireless Pairing</h1>
    <p class="desc">Điền thông tin từ màn hình "Ghép đôi thiết bị bằng mã ghép đôi" (Pair device with pairing code) trên điện thoại của bạn.</p>
    
    <div class="center">
      <div class="info-badge" id="ip-badge">Detecting your IP...</div>
    </div>

    <form id="pair-form">
      <div class="form-group">
        <label for="port">Pairing Port</label>
        <input type="number" id="port" class="form-control" placeholder="e.g. 37189" required>
      </div>
      <div class="form-group">
        <label for="code">Pairing Code (6 digits)</label>
        <input type="number" id="code" class="form-control" placeholder="e.g. 123456" pattern="\d{6}" required>
      </div>
      <button type="submit" class="btn" id="submit-btn">Pair with PC</button>
    </form>

    <div id="status-box" class="status-msg"></div>
  </div>

  <script>
    const ipBadge = document.getElementById('ip-badge');
    const pairForm = document.getElementById('pair-form');
    const submitBtn = document.getElementById('submit-btn');
    const statusBox = document.getElementById('status-box');

    let clientIp = '';

    // Fetch IP from backend
    async function fetchMyIp() {
      try {
        const res = await fetch('/api/devices/my-ip');
        const data = await res.json();
        if (data.success) {
          clientIp = data.ip;
          ipBadge.textContent = `Your IP: ${clientIp}`;
        }
      } catch (err) {
        ipBadge.textContent = 'Error detecting IP';
      }
    }

    fetchMyIp();

    pairForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const port = document.getElementById('port').value;
      const code = document.getElementById('code').value;

      if (!clientIp) {
        showStatus('Cannot detect your IP. Please reload the page.', 'error');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Pairing...';
      showStatus('', 'hide');

      try {
        const res = await fetch('/api/devices/pair', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ip: clientIp, port, code })
        });
        const data = await res.json();
        
        if (data.success) {
          showStatus('Paired successfully! You can close this page now.', 'success');
          submitBtn.textContent = 'Paired!';
        } else {
          showStatus(data.error || 'Pairing failed', 'error');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Try Again';
        }
      } catch (err) {
        showStatus(err.message, 'error');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Try Again';
      }
    });

    function showStatus(msg, type) {
      statusBox.className = 'status-msg';
      if (type === 'success') {
        statusBox.classList.add('status-success');
        statusBox.textContent = msg;
      } else if (type === 'error') {
        statusBox.classList.add('status-error');
        statusBox.textContent = msg;
      } else {
        statusBox.style.display = 'none';
      }
    }
  </script>
</body>
</html>
